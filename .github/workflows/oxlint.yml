name: oxlint

on:
  pull_request:
  push:
    branches: [main, develop]

permissions: {}

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: npm

      - run: npm install --frozen-lockfile
      - run: npm run lint:github
