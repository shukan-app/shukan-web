ls:
  .ts: kebab-case
  .tsx: kebab-case

  app/infrastructure:
    .ts: regex:^[a-z0-9-]+\.(repository|dto|mapper)(\.test)?$

  app/application:
    .ts: regex:^[a-z0-9-]+\.repository\.interface(\.test)?$

  app/model:
    .ts: regex:^[a-z0-9-]+\.model(\.test)?$

  app/components:
    .tsx: kebab-case

ignore:
  - .git
  - .github
  - .agents
  - .react-router
  - .vscode
  - node_modules
  - dist
  - build
  - coverage
